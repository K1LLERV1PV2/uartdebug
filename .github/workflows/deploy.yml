name: Deploy uartdebug

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      rollback:
        description: "Rollback to previous release without uploading new files"
        required: false
        type: boolean
        default: false
      to_release:
        description: "Rollback to a specific release tag, e.g. 20240810-153000"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN || '' }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug SSH connectivity (temporary)
        run: |
          set -euo pipefail
          KEY_FILE="$(mktemp)"
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              -i "$KEY_FILE" -p "${{ secrets.SSH_PORT || 22 }}" \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" 'whoami && hostname'

      - name: Upload public/ if exists and not rollback
        if: ${{ (hashFiles('public/**') != '') && (!inputs.rollback) }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "public"
          target: "/tmp/deploy/${{ github.sha }}/public"
          strip_components: 1
          rm: true

      - name: Upload backend/ if exists and not rollback
        if: ${{ (hashFiles('backend/**') != '') && (!inputs.rollback) }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "backend"
          target: "/tmp/deploy/${{ github.sha }}/backend"
          strip_components: 1
          rm: true

      - name: Upload python/ if exists and not rollback
        if: ${{ (hashFiles('python/**') != '') && (!inputs.rollback) }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "python"
          target: "/tmp/deploy/${{ github.sha }}/python"
          strip_components: 1
          rm: true

      - name: Run remote deploy / rollback
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -euo pipefail

            SHA="${{ github.sha }}"
            REF_NAME="${{ github.ref_name }}"
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

            ROOT="/var/www/uartdebug"
            PUB_DIR="${ROOT}/public"
            BE_DIR="${ROOT}/backend"
            PY_DIR="${ROOT}/python"

            RLS="${ROOT}/releases"
            PUB_RLS="${RLS}/public"
            BE_RLS="${RLS}/backend"
            PY_RLS="${RLS}/python"

            PM2_NAME="${{ secrets.PM2_NAME }}"
            [ -z "${PM2_NAME:-}" ] && PM2_NAME="uartdebug-backend"

            HC_URL="${{ secrets.HC_URL || '' }}"
            [ -z "${HC_URL:-}" ] && HC_URL="http://68.183.170.241/health"

            BACKEND_HC_URL="${{ secrets.BACKEND_HC_URL || '' }}"
            BACKEND_PORT="${{ secrets.BACKEND_PORT || '8082' }}"
            BACKEND_BIND_HOST="${{ secrets.BACKEND_BIND_HOST || '127.0.0.1' }}"
            [ -z "${BACKEND_PORT:-}" ] && BACKEND_PORT="8082"
            [ -z "${BACKEND_BIND_HOST:-}" ] && BACKEND_BIND_HOST="127.0.0.1"
            [ -z "${BACKEND_HC_URL:-}" ] && BACKEND_HC_URL="http://127.0.0.1:${BACKEND_PORT}/health"
            EXPECTED_COMPILE_SERVER_VERSION=""
            XC8_CC="${{ secrets.XC8_CC || '' }}"
            AVR_OBJCOPY="${{ secrets.AVR_OBJCOPY || '' }}"
            XC8_DFP="${{ secrets.XC8_DFP || '' }}"
            [ -z "${XC8_DFP:-}" ] && XC8_DFP="/opt/microchip/dfp/attiny/xc8"

            run_sudo() {
              command -v sudo >/dev/null 2>&1 || return 127
              sudo -n "$@"
            }

            print_backend_port_owner() {
              [ -n "${BACKEND_PORT:-}" ] || return 0
              echo "Backend port ${BACKEND_PORT} listeners:"

              if command -v ss >/dev/null 2>&1; then
                run_sudo ss -ltnp "sport = :${BACKEND_PORT}" 2>/dev/null || ss -ltnp "sport = :${BACKEND_PORT}" 2>/dev/null || true
              fi

              if command -v lsof >/dev/null 2>&1; then
                run_sudo lsof -nP -iTCP:"${BACKEND_PORT}" -sTCP:LISTEN 2>/dev/null || lsof -nP -iTCP:"${BACKEND_PORT}" -sTCP:LISTEN 2>/dev/null || true
              fi

              if command -v fuser >/dev/null 2>&1; then
                run_sudo fuser -v "${BACKEND_PORT}/tcp" 2>/dev/null || fuser -v "${BACKEND_PORT}/tcp" 2>/dev/null || true
              fi
            }

            backend_port_busy() {
              [ -n "${BACKEND_PORT:-}" ] || return 1

              if command -v fuser >/dev/null 2>&1; then
                run_sudo fuser "${BACKEND_PORT}/tcp" >/dev/null 2>&1 || fuser "${BACKEND_PORT}/tcp" >/dev/null 2>&1
                return $?
              fi

              if command -v lsof >/dev/null 2>&1; then
                [ -n "$(run_sudo lsof -ti TCP:"${BACKEND_PORT}" -sTCP:LISTEN 2>/dev/null || lsof -ti TCP:"${BACKEND_PORT}" -sTCP:LISTEN 2>/dev/null || true)" ]
                return $?
              fi

              return 1
            }

            stop_backend_port_owner() {
              [ -n "${BACKEND_PORT:-}" ] || return 0
              print_backend_port_owner

              if command -v fuser >/dev/null 2>&1; then
                echo "Stopping any process currently listening on backend port ${BACKEND_PORT}"
                run_sudo fuser -k "${BACKEND_PORT}/tcp" >/dev/null 2>&1 || fuser -k "${BACKEND_PORT}/tcp" >/dev/null 2>&1 || true
                sleep 2
              elif command -v lsof >/dev/null 2>&1; then
                pids="$(run_sudo lsof -ti TCP:"${BACKEND_PORT}" -sTCP:LISTEN 2>/dev/null || lsof -ti TCP:"${BACKEND_PORT}" -sTCP:LISTEN 2>/dev/null || true)"
                if [ -n "${pids}" ]; then
                  echo "Stopping process currently listening on backend port ${BACKEND_PORT}: ${pids}"
                  kill ${pids} || true
                  sleep 2
                fi
              else
                echo "Neither fuser nor lsof found; relying on PM2 process-name cleanup"
              fi

              print_backend_port_owner
              if backend_port_busy; then
                echo "Backend port ${BACKEND_PORT} is still busy after stop attempt"
                exit 1
              fi
            }

            find_backend_tool() {
              tool_name="$1"
              configured="$2"
              shift 2

              if [ -n "${configured:-}" ]; then
                if [ -x "${configured}" ]; then
                  printf '%s\n' "${configured}"
                  return 0
                fi

                resolved="$(command -v "${configured}" 2>/dev/null || true)"
                if [ -n "${resolved}" ]; then
                  printf '%s\n' "${resolved}"
                  return 0
                fi

                echo "Configured ${tool_name} path is not executable: ${configured}" >&2
                return 1
              fi

              resolved="$(command -v "${tool_name}" 2>/dev/null || true)"
              if [ -n "${resolved}" ]; then
                printf '%s\n' "${resolved}"
                return 0
              fi

              for candidate in "$@"; do
                [ -x "${candidate}" ] || continue
                printf '%s\n' "${candidate}"
                return 0
              done

              if [ -d "/opt/microchip" ]; then
                resolved="$(find /opt/microchip -type f -name "${tool_name}" -perm -111 2>/dev/null | sort -V | tail -n 1 || true)"
                if [ -n "${resolved}" ]; then
                  printf '%s\n' "${resolved}"
                  return 0
                fi
              fi

              return 1
            }

            resolve_expected_compile_server_version() {
              EXPECTED_COMPILE_SERVER_VERSION="$(
                sed -nE 's/.*COMPILE_SERVER_VERSION[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' "${BE_DIR}/compile-server.js" | head -n 1
              )"

              [ -n "${EXPECTED_COMPILE_SERVER_VERSION:-}" ] || {
                echo "Could not resolve COMPILE_SERVER_VERSION from ${BE_DIR}/compile-server.js"
                grep -n "COMPILE_SERVER_VERSION\\|/health" "${BE_DIR}/compile-server.js" || true
                exit 1
              }

              echo "Expected compile-server version: ${EXPECTED_COMPILE_SERVER_VERSION}"
            }

            resolve_backend_tools() {
              if ! XC8_CC="$(find_backend_tool "xc8-cc" "${XC8_CC:-}" \
                "/opt/microchip/xc8/v3.00/bin/xc8-cc" \
                "/opt/microchip/xc8/v2.50/bin/xc8-cc" \
                "/opt/microchip/xc8/bin/xc8-cc")"; then
                echo "Microchip XC8 compiler xc8-cc was not found on the server."
                echo "Install XC8 or set GitHub secret XC8_CC to the full xc8-cc path."
                exit 1
              fi

              xc8_root="$(dirname "$(dirname "${XC8_CC}")")"
              if ! AVR_OBJCOPY="$(find_backend_tool "avr-objcopy" "${AVR_OBJCOPY:-}" \
                "$(dirname "${XC8_CC}")/avr-objcopy" \
                "${xc8_root}/avr/bin/avr-objcopy" \
                "/usr/bin/avr-objcopy" \
                "/usr/local/bin/avr-objcopy")"; then
                echo "avr-objcopy was not found on the server."
                echo "Install AVR binutils or set GitHub secret AVR_OBJCOPY to the full avr-objcopy path."
                exit 1
              fi

              if [ ! -d "${XC8_DFP}" ]; then
                echo "XC8 DFP path was not found: ${XC8_DFP}"
                echo "Install the ATtiny DFP or set GitHub secret XC8_DFP to the correct directory."
                exit 1
              fi

              export XC8_CC AVR_OBJCOPY XC8_DFP
              export PATH="$(dirname "${XC8_CC}"):$(dirname "${AVR_OBJCOPY}"):${PATH}"
              echo "XC8_CC=${XC8_CC}"
              echo "AVR_OBJCOPY=${AVR_OBJCOPY}"
              echo "XC8_DFP=${XC8_DFP}"
            }

            KEEP="${{ secrets.RELEASES_KEEP || '10' }}"
            ROLLBACK="${{ inputs.rollback && '1' || '' }}"
            TO_RELEASE="${{ inputs.to_release || '' }}"

            sudo mkdir -p "${PUB_RLS}" "${BE_RLS}" "${PY_RLS}"
            sudo chown -R "$USER":"$USER" "${ROOT}" "${RLS}" "${PUB_RLS}" "${BE_RLS}" "${PY_RLS}"

            ts_bootstrap="$(date +%Y%m%d-%H%M%S)-bootstrap"
            for X in public backend python; do
              DIR="${ROOT}/${X}"
              RLS_DIR="${RLS}/${X}"
              [ -d "$RLS_DIR" ] || mkdir -p "$RLS_DIR"
              if [ ! -L "$DIR" ] && [ -d "$DIR" ]; then
                mkdir -p "${RLS_DIR}/${ts_bootstrap}"
                rsync -a --delete "${DIR}/" "${RLS_DIR}/${ts_bootstrap}/"
                rm -rf "${DIR}"
                ln -sfn "${RLS_DIR}/${ts_bootstrap}" "${DIR}"
              fi
            done

            if [ -n "${ROLLBACK}" ]; then
              echo "== Rollback mode =="
              if [ -n "${TO_RELEASE}" ]; then
                [ -d "${PUB_RLS}/${TO_RELEASE}" ] && ln -sfn "${PUB_RLS}/${TO_RELEASE}" "${PUB_DIR}" || echo "No public release ${TO_RELEASE}"
                [ -d "${BE_RLS}/${TO_RELEASE}" ] && ln -sfn "${BE_RLS}/${TO_RELEASE}" "${BE_DIR}" || echo "No backend release ${TO_RELEASE}"
                [ -d "${PY_RLS}/${TO_RELEASE}" ] && ln -sfn "${PY_RLS}/${TO_RELEASE}" "${PY_DIR}" || echo "No python release ${TO_RELEASE}"
              else
                if [ -d "${PUB_RLS}" ]; then
                  last_pub="$(ls -1 "${PUB_RLS}" | sort | tail -n 2 | head -n 1 || true)"
                  [ -n "${last_pub}" ] && ln -sfn "${PUB_RLS}/${last_pub}" "${PUB_DIR}" || echo "No previous public release"
                fi
                if [ -d "${BE_RLS}" ]; then
                  last_be="$(ls -1 "${BE_RLS}" | sort | tail -n 2 | head -n 1 || true)"
                  [ -n "${last_be}" ] && ln -sfn "${BE_RLS}/${last_be}" "${BE_DIR}" || echo "No previous backend release"
                fi
                if [ -d "${PY_RLS}" ]; then
                  last_py="$(ls -1 "${PY_RLS}" | sort | tail -n 2 | head -n 1 || true)"
                  [ -n "${last_py}" ] && ln -sfn "${PY_RLS}/${last_py}" "${PY_DIR}" || echo "No previous python release"
                fi
              fi
            else
              echo "== Deploy new build =="
              PUB_SRC="/tmp/deploy/${SHA}/public"
              BE_SRC="/tmp/deploy/${SHA}/backend"
              PY_SRC="/tmp/deploy/${SHA}/python"

              NOW="$(date +%Y%m%d-%H%M%S)-${SHA:0:7}"
              PUB_NEW="${PUB_RLS}/${NOW}"
              BE_NEW="${BE_RLS}/${NOW}"
              PY_NEW="${PY_RLS}/${NOW}"

              if [ -d "$PUB_SRC" ]; then
                rm -rf "$PUB_NEW"
                mkdir -p "$PUB_NEW"
                rsync -a --delete "$PUB_SRC"/ "$PUB_NEW"/
                printf 'sha=%s\nref=%s\nrun=%s\n' "$SHA" "$REF_NAME" "$RUN_URL" > "$PUB_NEW/RELEASE.txt"
                ln -sfn "$PUB_NEW" "$PUB_DIR"
              else
                echo "No frontend artifacts at $PUB_SRC (skip)"
              fi

              if [ -d "$BE_SRC" ]; then
                rm -rf "$BE_NEW"
                mkdir -p "$BE_NEW"
                rsync -a --delete "$BE_SRC"/ "$BE_NEW"/
                printf 'sha=%s\nref=%s\nrun=%s\n' "$SHA" "$REF_NAME" "$RUN_URL" > "$BE_NEW/RELEASE.txt"
                ln -sfn "$BE_NEW" "$BE_DIR"
              else
                echo "No backend artifacts at $BE_SRC (skip)"
              fi

              if [ -d "$PY_SRC" ]; then
                rm -rf "$PY_NEW"
                mkdir -p "$PY_NEW"
                rsync -a --delete "$PY_SRC"/ "$PY_NEW"/
                printf 'sha=%s\nref=%s\nrun=%s\n' "$SHA" "$REF_NAME" "$RUN_URL" > "$PY_NEW/RELEASE.txt"
                ln -sfn "$PY_NEW" "$PY_DIR"
              else
                echo "No python artifacts at $PY_SRC (skip)"
              fi
            fi

            if command -v nginx >/dev/null 2>&1; then
              sudo nginx -t && sudo systemctl reload nginx || true
            fi

            if [ -d "${BE_DIR}" ]; then
              if [ -f "${BE_DIR}/package.json" ]; then
                cd "${BE_DIR}"
                npm ci --omit=dev || npm install --omit=dev
              fi
              resolve_backend_tools
              if [ -z "${ROLLBACK}" ] && [ -f "${BE_DIR}/compile-server.js" ]; then
                resolve_expected_compile_server_version
              fi

              if command -v pm2 >/dev/null 2>&1; then
                export PORT="${BACKEND_PORT}"
                export HOST="${BACKEND_BIND_HOST}"
                export BIND_HOST="${BACKEND_BIND_HOST}"
                if [ -f "${BE_DIR}/ecosystem.config.js" ]; then
                  cd "${BE_DIR}"
                  pm2 delete "${PM2_NAME}" >/dev/null 2>&1 || true
                  stop_backend_port_owner
                  pm2 start ecosystem.config.js --only "${PM2_NAME}" --update-env
                elif [ -f "${BE_DIR}/compile-server.js" ]; then
                  if [ -z "${ROLLBACK}" ]; then
                    grep -q "${EXPECTED_COMPILE_SERVER_VERSION}" "${BE_DIR}/compile-server.js" || {
                      echo "Deployed backend file does not contain expected compile-server version ${EXPECTED_COMPILE_SERVER_VERSION}"
                      grep -n "COMPILE_SERVER_VERSION\\|/health" "${BE_DIR}/compile-server.js" || true
                      exit 1
                    }
                  fi
                  pm2 delete "${PM2_NAME}" >/dev/null 2>&1 || true
                  stop_backend_port_owner
                  pm2 start "${BE_DIR}/compile-server.js" --name "${PM2_NAME}" --cwd "${BE_DIR}" --update-env
                else
                  echo "No backend entrypoint found in ${BE_DIR}"
                  exit 1
                fi
                sleep 2
                pm2 save
              else
                echo "pm2 not found - backend cannot be restarted"
                exit 1
              fi
            fi

            if [ -z "${ROLLBACK}" ] && [ -d "${BE_DIR}" ] && [ -f "${BE_DIR}/compile-server.js" ]; then
              echo "Backend healthcheck: ${BACKEND_HC_URL}"
              backend_hc_body="$(mktemp)"
              backend_code="000"
              if ! backend_code="$(curl -sS -o "${backend_hc_body}" -w '%{http_code}' --max-time 10 "${BACKEND_HC_URL}")"; then
                backend_code="000"
              fi
              echo "Backend HTTP ${backend_code}"
              [ "${backend_code}" = "200" ] || {
                echo "Backend healthcheck failed"
                cat "${backend_hc_body}" || true
                rm -f "${backend_hc_body}"
                exit 1
              }
              grep -q "${EXPECTED_COMPILE_SERVER_VERSION}" "${backend_hc_body}" || {
                echo "Backend healthcheck did not return expected compile-server version ${EXPECTED_COMPILE_SERVER_VERSION}"
                cat "${backend_hc_body}" || true
                echo "Deployed backend version lines:"
                grep -n "COMPILE_SERVER_VERSION\\|/health" "${BE_DIR}/compile-server.js" || true
                echo "PM2 status:"
                pm2 status "${PM2_NAME}" || true
                echo "PM2 recent logs:"
                pm2 logs "${PM2_NAME}" --lines 50 --nostream || true
                rm -f "${backend_hc_body}"
                exit 1
              }
              rm -f "${backend_hc_body}"
            fi

            if [ -n "${HC_URL}" ]; then
              echo "Healthcheck: ${HC_URL}"
              hc_body="$(mktemp)"
              code="000"
              if ! code="$(curl -sS -o "${hc_body}" -w '%{http_code}' --max-time 10 "${HC_URL}")"; then
                code="000"
              fi
              echo "HTTP ${code}"
              [ "${code}" = "200" ] || {
                echo "Healthcheck failed"
                cat "${hc_body}" || true
                rm -f "${hc_body}"
                exit 1
              }
              rm -f "${hc_body}"
            fi

            if [ -z "${ROLLBACK}" ]; then
              for BASE in "${PUB_RLS}" "${BE_RLS}" "${PY_RLS}"; do
                [ -d "$BASE" ] || continue
                count="$(ls -1 "$BASE" | sort | wc -l | tr -d ' ')"
                if [ "$count" -gt "$KEEP" ]; then
                  del=$((count - KEEP))
                  echo "Pruning $del old releases in $BASE..."
                  ls -1 "$BASE" | sort | head -n "$del" | xargs -r -I{} rm -rf "$BASE/{}"
                fi
              done
            fi

            echo "Deploy OK"

      - name: Cleanup temp on server
        if: ${{ always() && !inputs.rollback }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            rm -rf "/tmp/deploy/${{ github.sha }}" || true

      - name: Notify Telegram (success)
        if: ${{ success() && env.TG_BOT_TOKEN != '' && env.TG_CHAT_ID != '' }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode=HTML \
            -d text="<b>Deploy success</b>%0Arepo: ${{ github.repository }}%0Asha: ${{ github.sha }}%0A<code>${{ github.ref_name }}</code>%0A<a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Open run</a>" \
            >/dev/null || true

      - name: Notify Telegram (failure)
        if: ${{ failure() && env.TG_BOT_TOKEN != '' && env.TG_CHAT_ID != '' }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode=HTML \
            -d text="<b>Deploy failed</b>%0Arepo: ${{ github.repository }}%0Asha: ${{ github.sha }}%0A<code>${{ github.ref_name }}</code>%0A<a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Open run</a>" \
            >/dev/null || true
